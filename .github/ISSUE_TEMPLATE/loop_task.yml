name: Loop Task
description: GitHub Project, Obsidian, Quartz까지 이어지는 실행 루프용 이슈
title: "[Loop] "
labels:
  - type/task
body:
  - type: markdown
    attributes:
      value: |
        이 이슈는 실행 단위입니다. 배경과 판단은 Obsidian에, 공개 가능한 결과는 Quartz 후보로 보냅니다.
  - type: input
    id: purpose
    attributes:
      label: 목적
      description: 왜 이 작업을 하나요?
      placeholder: 예) 회의 요구사항을 실행 가능한 작업으로 정리한다.
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: 완료 기준
      description: 이슈를 닫기 전에 확인할 조건입니다.
      value: |
        - [ ] 
        - [ ] 
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: 결과물
      description: 완료되면 무엇이 남나요?
      placeholder: 예) Obsidian 노트, Quartz 문서 후보, 자동화 스크립트, 운영 규칙
    validations:
      required: true
  - type: input
    id: obsidian
    attributes:
      label: Obsidian 연결 노트
      description: 관련 노트 경로 또는 위키링크를 적습니다.
      placeholder: Knowledge/Issues/Issue NN - 제목.md
  - type: dropdown
    id: loop_type
    attributes:
      label: Loop Type
      options:
        - issue
        - daily
        - publish
        - decision
        - automation
    validations:
      required: true
  - type: dropdown
    id: public_status
    attributes:
      label: 공개 상태
      options:
        - private
        - candidate
        - published
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: 실행 로그
      description: 진행 중 알게 된 내용, 결정, 링크를 짧게 남깁니다.
      value: |
        - 
  - type: textarea
    id: reflect
    attributes:
      label: 회고
      description: 닫기 전에 채웁니다.
      value: |
        배운 점:
        막힌 점:
        다음 액션:
