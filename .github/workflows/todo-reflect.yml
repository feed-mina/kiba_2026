name: todo-reflect

# Todo/ 폴더가 바뀐 채로 main 에 push 되면:
#  1) Todo/*.md 를 GitHub Issue 로 멱등 생성/갱신 (라벨 todo)
#  2) index.html 의 TODO-AUTO 블록을 재생성해 커밋 -> GitHub Pages 보드에 반영
on:
  push:
    branches: [main]
    paths:
      - 'Todo/**'
  workflow_dispatch:        # 수동 실행도 가능

concurrency:
  group: todo-reflect
  cancel-in-progress: false

permissions:
  contents: write           # index.html 커밋/푸시
  issues: write             # 이슈 생성/수정

jobs:
  reflect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Reflect Todo -> Issues + Pages board
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_REPOSITORY, GITHUB_API_URL 은 러너가 자동 주입
        run: python scripts/reflect_todo.py

      - name: Commit updated index.html (변경 있을 때만)
        run: |
          if [ -n "$(git status --porcelain index.html)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "chore: reflect Todo into Pages board [skip ci]"
            git push
          else
            echo "index.html 변경 없음 — 커밋 생략"
          fi

# 참고
# - 이 워크플로는 Todo/** 변경에만 동작하고, index.html 커밋은 [skip ci] 라 루프가 없습니다.
# - 이슈는 본문의 <!-- todo-file: <경로> --> 마커로 같은 파일을 식별해 중복 생성하지 않습니다.
# - GitHub Pages 가 main 의 index.html 을 자동 배포하면 보드에 바로 반영됩니다.
